name: Refresh and deploy listings

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: house-tracker-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh listings
        run: npm run house:scan
        env:
          HOUSE_TRACKER_DELAY_MS: "750"

      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/house-tracker/latest.json data/house-tracker/history.jsonl public/data/house-tracker/latest.json
          if git diff --cached --quiet; then
            echo "No listing changes to commit."
            exit 0
          fi
          git commit -m "Refresh house listings"
          git push
